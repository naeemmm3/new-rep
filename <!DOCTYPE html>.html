<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Shop</title>
  <style>
    body { font-family: Arial; margin: 0; }
    header { background: #333; color: white; padding: 15px; text-align: center; }
    .container { display: flex; flex-wrap: wrap; padding: 20px; }
    .product { border: 1px solid #ccc; border-radius: 10px; padding: 15px; margin: 10px; width: 200px; text-align: center; }
    .product img { width: 100%; height: 150px; object-fit: cover; }
    button { background: green; color: white; padding: 10px; border: none; cursor: pointer; }
    button:hover { background: darkgreen; }
    #cart { position: fixed; right: 0; top: 0; background: #f4f4f4; width: 250px; height: 100%; padding: 20px; overflow-y: auto; }
  </style>
</head>
<body>

<header>
  <h1>My Shopping Website</h1>
</header>

<div class="container" id="products"></div>

<div id="cart">
  <h2>Cart</h2>
  <ul id="cart-items"></ul>
  <h3>Total: ₹<span id="total">0</span></h3>
</div>

<script>
  const products = [
    { id: 1, name: "Shoes", price: 1200, img: "https://via.placeholder.com/200" },
    { id: 2, name: "T-Shirt", price: 800, img: "https://via.placeholder.com/200" },
    { id: 3, name: "Watch", price: 2500, img: "https://via.placeholder.com/200" }
  ];

  let cart = [];

  function displayProducts() {
    const productDiv = document.getElementById('products');
    products.forEach(p => {
      productDiv.innerHTML += `
        <div class="product">
          <img src="${p.img}" />
          <h3>${p.name}</h3>
          <p>₹${p.price}</p>
          <button onclick="addToCart(${p.id})">Add to Cart</button>
        </div>
      `;
    });
  }

  function addToCart(id) {
    const product = products.find(p => p.id === id);
    cart.push(product);
    updateCart();
  }

  function updateCart() {
    const cartList = document.getElementById('cart-items');
    const totalSpan = document.getElementById('total');
    cartList.innerHTML = '';
    let total = 0;

    cart.forEach(item => {
      total += item.price;
      cartList.innerHTML += `<li>${item.name} - ₹${item.price}</li>`;
    });

    totalSpan.innerText = total;
  }

  displayProducts();
</script>

</body>
</html>
